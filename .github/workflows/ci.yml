name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          # Adopter-facing prose only. skills/, templates/, commands/, and
          # backends/ files use agent-prompt DSL conventions (placeholder
          # <angle-bracket> notation, list-after-heading without blank lines)
          # that don't fit generic markdownlint rules. Expanding the lint
          # surface into those directories is a v1.1 follow-on.
          globs: |
            README.md
            CONTRIBUTING.md
            CHANGELOG.md
            examples/**/*.md

  yaml-validate:
    name: YAML validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: yamllint -d relaxed .

  backend-contract:
    name: Backend contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every contract operation must appear in every backend
        run: |
          set -euo pipefail
          contract_ops=$(grep -oP '^### `\K[a-z_]+(?=`)' backends/_interface.md | sort -u)
          if [ -z "$contract_ops" ]; then
            echo "FAIL: no operation headings found in backends/_interface.md"
            echo "  (expected headings of the form '### \`<op>\`')"
            exit 1
          fi
          fail=0
          for backend in backends/github.md backends/jira.md; do
            backend_ops=$(grep -oP '^### `\K[a-z_]+(?=`)' "$backend" | sort -u)
            missing=$(comm -23 <(echo "$contract_ops") <(echo "$backend_ops") || true)
            if [ -n "$missing" ]; then
              echo "FAIL: $backend missing contract operations:"
              echo "$missing" | sed 's/^/  - /'
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: all backends implement all contract operations"
          echo "$contract_ops" | sed 's/^/  - /'

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest -q

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck hook scripts
        run: shellcheck hooks/*.sh
